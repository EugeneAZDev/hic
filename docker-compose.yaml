services:
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - ./.env.${APP_ENV}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - APP_ENV=${APP_ENV}
    ports:
      - "5001:3000" # Host:5001 => Container:3000
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    ports:
      - "7001:3001" # Host:7001 => Container:3001
    environment:
      - APP_ENV=${APP_ENV}
    env_file:
      - ./.env.${APP_ENV}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health').on('response', (r) => { if (r.statusCode !== 200) throw new Error('not healthy') })"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  postgres:
    image: postgres:15
    environment:
      APP_ENV: ${APP_ENV}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${POSTGRES_PORT}/${POSTGRES_DB}
    env_file:
      - ./.env.${APP_ENV}
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # redis:
  #   image: redis:7
  #   ports:
  #     - "6379:6379"

  # mosquitto:
  #   image: eclipse-mosquitto:2
  #   ports:
  #     - "1883:1883"
  #   volumes:
  #     - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  db_data: